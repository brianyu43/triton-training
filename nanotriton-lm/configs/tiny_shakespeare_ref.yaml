seed: 1337
device: auto
dtype: float16
compile: false
out_dir: out/tiny_shakespeare_ref
eval_interval: 100
log_interval: 10
eval_iters: 20
max_iters: 1000
batch_size: 16
learning_rate: 0.0006
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
warmup_iters: 50
lr_decay_iters: 1000
min_lr: 0.00006

data:
  dataset: shakespeare_char
  data_dir: data/shakespeare_char

model:
  vocab_size: 0
  block_size: 128
  n_layer: 4
  n_head: 4
  n_embd: 128
  dropout: 0.0
  bias: false
  norm_type: rmsnorm
  mlp_type: swiglu
